name: Update Verification Data

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tools/点我启动工具.bat'
      - 'tools/generate_verification.py'

jobs:
  update-verification:
    runs-on: windows-latest
    env:
      PYTHON_VERSION: "3.12.10"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Python Embedded
        id: cache-python
        uses: actions/cache@v4
        with:
          path: python-embed
          key: windows-python-embed-${{ env.PYTHON_VERSION }}

      - name: Download Python Embedded
        if: steps.cache-python.outputs.cache-hit != 'true'
        run: |
          Invoke-WebRequest -Uri https://www.python.org/ftp/python/${{ env.PYTHON_VERSION }}/python-${{ env.PYTHON_VERSION }}-embed-amd64.zip -OutFile python-embed.zip
          Expand-Archive python-embed.zip -DestinationPath python-embed

          $pthFile = Get-ChildItem -Path python-embed -Filter "python*._pth" | Select-Object -First 1
          $content = Get-Content $pthFile.FullName
          if ($content -match "#\s*import site") {
              $content = $content -replace "#\s*import site", "import site"
          } else {
              $content += "import site"
          }
          $content | Set-Content $pthFile.FullName -Encoding UTF8
        shell: pwsh

      - name: Compile Python files to .pyc
        run: .\python-embed\python.exe -m compileall src
        shell: pwsh

      - name: Generate verification data
        run: |
            .\python-embed\python.exe tools/generate_verification.py `
              --src-root src `
              --start-bat tools/点我启动工具.bat `
              --verification-file ext/verification.json `
              --commit-sha "${{ github.sha }}"
        shell: pwsh

      - name: Commit verification data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ext/verification.json
          if (git diff --cached --quiet) {
            echo "No verification changes to commit."
          } else {
            git commit -m "chore: update ext/verification.json [skip ci]"
            $max_retries = 3
            $retry_count = 0
            $success = $false
            while (-not $success -and $retry_count -lt $max_retries) {
              git pull origin ${{ github.ref_name }} --rebase
              git push origin HEAD:${{ github.ref_name }}
              if ($LASTEXITCODE -eq 0) {
                $success = $true
              } else {
                $retry_count++
                Start-Sleep -Seconds (5 * $retry_count)
              }
            }
            if (-not $success) {
              Write-Error "Failed to push after $max_retries retries."
              exit 1
            }
          }
        shell: pwsh
