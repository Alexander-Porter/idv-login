<!doctype html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IDV Login 完整性校验</title>
  <style>
    :root {
      --bg: #0d1b2a;
      --panel: #1b263b;
      --text: #e0e1dd;
      --muted: #9aa6b2;
      --ok: #58d68d;
      --err: #ff6b6b;
      --btn: #415a77;
      --btn2: #2b8a3e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans", sans-serif;
      background: radial-gradient(circle at top right, #1b263b, #0d1b2a 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      width: min(980px, 100%);
      background: rgba(27, 38, 59, 0.92);
      border: 1px solid rgba(154, 166, 178, 0.25);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 18px 38px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.25rem;
    }
    p {
      margin: 0 0 10px;
      color: var(--muted);
      line-height: 1.5;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 10px 0;
      align-items: center;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      color: white;
      cursor: pointer;
      font-weight: 600;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #pickBtn { background: var(--btn); }
    #verifyBtn { background: var(--btn2); }
    code {
      color: #ffd43b;
      background: rgba(0, 0, 0, 0.22);
      padding: 2px 6px;
      border-radius: 5px;
    }
    #status {
      margin-top: 8px;
      color: var(--muted);
      min-height: 1.4em;
    }
    #result {
      margin-top: 12px;
      white-space: pre-wrap;
      background: rgba(0, 0, 0, 0.28);
      border-radius: 10px;
      padding: 12px;
      border: 1px solid rgba(154, 166, 178, 0.2);
      min-height: 220px;
      max-height: 54vh;
      overflow: auto;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
    }
    .ok { color: var(--ok); }
    .err { color: var(--err); }
  </style>

</head>
<body>
  <div class="card">
    <h1>IDV Login 完整性检查</h1>
    <p>
      请选择安装文件夹（包含 <code>点我启动工具.bat</code> 的文件夹），工具将会检查 <code>src/</code> 目录下的 Python 文件和启动脚本的完整性。
    </p>
    <div class="row">
      <button id="pickBtn">选择安装文件夹</button>
      <button id="verifyBtn" disabled>开始验证！</button>
      <span id="pickedPath">暂未选择</span>
    </div>
    <div id="status">初始化云端Python环境...</div>
    <div id="result"></div>
  </div>

  <script>
    const PYODIDE_FALLBACK_SOURCES = [
      "https://fastly.jsdelivr.net/pyodide/v0.27.7/full/pyodide.js",
      "https://cdn.jsdelivr.net/pyodide/v0.27.7/full/pyodide.js",
      "https://gcore.jsdelivr.net/pyodide/v0.27.7/full/pyodide.js",
      "https://unpkg.com/pyodide@0.27.7/pyodide.js"
    ];

    const VERIFICATION_URLS = [
      "https://raw.githubusercontent.com/KKeygen/idv-login/main/ext/verification.json",
      "https://cdn.jsdelivr.net/gh/KKeygen/idv-login@main/ext/verification.json",
      "https://hk.gh-proxy.org/https://raw.githubusercontent.com/KKeygen/idv-login/main/ext/verification.json"
    ];
    
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const pickBtn = document.getElementById("pickBtn");
    const verifyBtn = document.getElementById("verifyBtn");
    const pickedPathEl = document.getElementById("pickedPath");

    let pyodide = null;
    let selectedDirHandle = null;
    let selectedVerificationUrl = "";

    const pySource = `
  import base64
  import hashlib
  import json
  import marshal


  def sha256_bytes(data: bytes) -> str:
    return hashlib.sha256(data).hexdigest()


  def normalized_text_sha256(data: bytes) -> str:
    if data.startswith(b"\\xef\\xbb\\xbf"):
      data = data[3:]
    data = data.replace(b"\\r\\n", b"\\n").replace(b"\\r", b"\\n")
    return sha256_bytes(data)


  def normalize_code_object(code_obj, filename: str = "<normalized>"):
    new_consts = []
    for const in code_obj.co_consts:
      if isinstance(const, type(code_obj)):
        new_consts.append(normalize_code_object(const, filename))
      else:
        new_consts.append(const)
    return code_obj.replace(co_filename=filename, co_consts=tuple(new_consts))


  def marshal_sha256_from_pyc_bytes(data: bytes) -> str:
    if len(data) < 16:
      raise ValueError("Invalid pyc header")
    code_obj = marshal.loads(data[16:])
    normalized = normalize_code_object(code_obj)
    return sha256_bytes(marshal.dumps(normalized))


  def validate_buildinfo_pyc_bytes(data: bytes):
    if len(data) < 16:
      return False, "invalid pyc header"

    code_obj = marshal.loads(data[16:])
    strings = []

    def walk_consts(obj):
      for const in obj.co_consts:
        if isinstance(const, str):
          strings.append(const)
        elif isinstance(const, type(obj)):
          walk_consts(const)

    walk_consts(code_obj)

    if len(strings) != 2:
      return False, f"expected 2 string constants, got {len(strings)}"

    names = set(code_obj.co_names)
    if names != {"BUILD_INFO", "VERSION"}:
      return False, f"unexpected co_names: {tuple(code_obj.co_names)}"

    if not strings[0].startswith("Build in "):
      return False, "BUILD_INFO value format invalid"

    if not strings[1]:
      return False, "VERSION value is empty"

    return True, ""


  def verify_payload(payload_json: str) -> str:
    payload = json.loads(payload_json)
    verification_records = payload["verification_records"]
    files_b64 = payload["files_b64"]

    files = {k: base64.b64decode(v) for k, v in files_b64.items()}

    indexed_global = {}
    for record in verification_records:
      if not isinstance(record, dict):
        continue
      module = record.get("module")
      if not module:
        continue
      indexed_global.setdefault(module, []).append(record)

    def classify_match(module: str, source_sha256, marshal_sha256):
      candidates = indexed_global.get(module)
      if not candidates:
        return "missing"
      for rec in candidates:
        if source_sha256 is not None and rec.get("source_sha256") != source_sha256:
          continue
        if marshal_sha256 is not None and rec.get("marshal_sha256") != marshal_sha256:
          continue
        return "match"
      return "not_match"

    missing = []
    not_match = []
    invalid = []
    checked_count = 0

    for rel_path in sorted(files.keys()):
      low = rel_path.lower()
      if not low.startswith("src/"):
        continue
      if "/__pycache__/" in low:
        continue
      if not (low.endswith(".py") or low.endswith(".pyc")):
        continue

      if low.endswith(".pyc"):
        module = "src." + rel_path[4:-4].replace("/", ".")

        if module == "src.buildinfo":
          ok, reason = validate_buildinfo_pyc_bytes(files[rel_path])
          if not ok:
            invalid.append(f"{module}: {reason}")
            continue
          checked_count += 1
          continue

        local_marshal = marshal_sha256_from_pyc_bytes(files[rel_path])
        state = classify_match(module, None, local_marshal)
        if state == "missing":
          missing.append(module)
          continue
        if state == "not_match":
          not_match.append(module)
          continue

        checked_count += 1
      else:
        module = "src." + rel_path[4:-3].replace("/", ".")
        local_source = sha256_bytes(files[rel_path])
        state = classify_match(module, local_source, None)
        if state == "missing":
          missing.append(module)
          continue
        if state == "not_match":
          not_match.append(module)
          continue
        checked_count += 1

    bat_module = None
    bat_bytes = None
    for candidate in ("start.bat", "点我启动工具.bat"):
      if candidate in files:
        bat_module = candidate
        bat_bytes = files[candidate]
        break

    if bat_bytes is None:
      return "校验失败\\n未找到启动脚本（已检查 start.bat 和 点我启动工具.bat）。"

    local_bat_hash = sha256_bytes(bat_bytes)
    local_bat_normalized_hash = normalized_text_sha256(bat_bytes)
    state_raw = classify_match(bat_module, local_bat_hash, None)
    state_norm = classify_match(bat_module, local_bat_normalized_hash, None)
    if state_raw != "match" and state_norm != "match":
      if state_raw == "missing" and state_norm == "missing":
        missing.append(bat_module)
      else:
        not_match.append(bat_module)
    checked_count += 1

    if missing or not_match or invalid:
      lines = ["校验失败"]
      if missing:
        lines.append("远端记录中缺失以下模块/文件：")
        for m in missing:
          lines.append(f"  - {m}")
      if not_match:
        lines.append("存在记录但哈希不匹配：")
        for m in not_match:
          lines.append(f"  - {m}")
      if invalid:
        lines.append("特殊规则校验失败：")
        for m in invalid:
          lines.append(f"  - {m}")
      return "\\n".join(lines)

    return f"校验通过\\n模式：global-hash\\n已检查项目数：{checked_count}"
  `;

    async function initPyodideRuntime() {
      statusEl.textContent = "正在加载 Pyodide 运行环境...";
      if (typeof loadPyodide !== "function") {
        let loaded = false;
        for (const src of PYODIDE_FALLBACK_SOURCES) {
          statusEl.textContent = `主源不可用，尝试备用 Pyodide 源：${src}`;
          try {
            await new Promise((resolve, reject) => {
              const s = document.createElement("script");
              s.src = src;
              s.crossOrigin = "anonymous";
              s.referrerPolicy = "no-referrer";
              s.onload = resolve;
              s.onerror = () => reject(new Error(`加载失败：${src}`));
              document.head.appendChild(s);
            });
            if (typeof loadPyodide === "function") {
              loaded = true;
              break;
            }
          } catch (_e) {
            // try next
          }
        }
        if (!loaded && typeof loadPyodide !== "function") {
          throw new Error("所有 Pyodide 源都加载失败，请检查网络后重试。");
        }
      }
      pyodide = await loadPyodide();
      pyodide.runPython(pySource.replace(/^  /gm, ""));
      statusEl.textContent = "环境就绪，请先选择安装文件夹。";
    }

    async function fetchVerificationWithFallback() {
      let lastErr = null;
      for (const url of VERIFICATION_URLS) {
        try {
          const resp = await fetch(url, { cache: "no-store" });
          if (!resp.ok) {
            lastErr = new Error(`获取失败（HTTP ${resp.status}）：${url}`);
            continue;
          }
          const data = await resp.json();
          if (!Array.isArray(data)) {
            lastErr = new Error(`远端 verification.json 格式错误（不是数组）：${url}`);
            continue;
          }
          selectedVerificationUrl = url;
          return data;
        } catch (e) {
          lastErr = e;
        }
      }
      throw lastErr || new Error("所有 verification.json 源都获取失败，请检查网络后重试。");
    }

    async function iterFilesRecursive(dirHandle, basePath = "") {
      const out = [];
      for await (const entry of dirHandle.values()) {
        const rel = basePath ? `${basePath}/${entry.name}` : entry.name;
        if (entry.kind === "file") {
          out.push({ relPath: rel, handle: entry });
        } else if (entry.kind === "directory") {
          const nested = await iterFilesRecursive(entry, rel);
          out.push(...nested);
        }
      }
      return out;
    }

    async function toBase64(arrayBuffer) {
      const bytes = new Uint8Array(arrayBuffer);
      let binary = "";
      const chunk = 0x8000;
      for (let i = 0; i < bytes.length; i += chunk) {
        binary += String.fromCharCode(...bytes.subarray(i, i + chunk));
      }
      return btoa(binary);
    }

    function shouldCollect(relPath) {
      const low = relPath.toLowerCase();
      if (low.startsWith("src/")) {
        if (low.includes("/__pycache__/")) return false;
        return low.endsWith(".py") || low.endsWith(".pyc");
      }
      return relPath === "start.bat" || relPath === "点我启动工具.bat";
    }

    async function buildPayloadFromSelectedDir() {
      const all = await iterFilesRecursive(selectedDirHandle);
      const filesB64 = {};

      for (const item of all) {
        if (!shouldCollect(item.relPath)) continue;
        const file = await item.handle.getFile();
        const buf = await file.arrayBuffer();
        filesB64[item.relPath] = await toBase64(buf);
      }

      const verificationRecords = await fetchVerificationWithFallback();

      return {
        verification_records: verificationRecords,
        files_b64: filesB64
      };
    }

    async function runVerification() {
      if (!selectedDirHandle) {
        alert("请先选择安装文件夹。");
        return;
      }
      verifyBtn.disabled = true;
      pickBtn.disabled = true;
      statusEl.textContent = "正在读取所选文件夹中的待校验文件...";
      resultEl.textContent = "";
      resultEl.className = "";

      try {
        const payload = await buildPayloadFromSelectedDir();
        statusEl.textContent = `正在执行校验算法...（远端源：${selectedVerificationUrl}）`;

        const payloadJson = JSON.stringify(payload);
        const out = await pyodide.runPythonAsync(`verify_payload(${JSON.stringify(payloadJson)})`);

        resultEl.textContent = out;
        if (String(out).startsWith("Verification OK")) {
          resultEl.className = "ok";
        } else {
          resultEl.className = "err";
        }
        statusEl.textContent = "校验完成。";
      } catch (err) {
        resultEl.className = "err";
        resultEl.textContent = `错误：\n${err?.stack || err}`;
        statusEl.textContent = "执行失败。";
      } finally {
        verifyBtn.disabled = false;
        pickBtn.disabled = false;
      }
    }

    pickBtn.addEventListener("click", async () => {
      try {
        if (!window.showDirectoryPicker) {
          alert("当前浏览器不支持目录选择 API，请使用较新的 Chromium 内核浏览器。\n推荐：Edge / Chrome 最新版。");
          return;
        }
        selectedDirHandle = await window.showDirectoryPicker({ mode: "read" });
        pickedPathEl.textContent = `已选择：${selectedDirHandle.name}`;
        verifyBtn.disabled = false;
      } catch (err) {
        if (err?.name !== "AbortError") {
          statusEl.textContent = `选择目录失败：${err}`;
        }
      }
    });

    verifyBtn.addEventListener("click", runVerification);

    initPyodideRuntime().catch((err) => {
      statusEl.textContent = `初始化 Pyodide 失败：${err}`;
      resultEl.className = "err";
      resultEl.textContent = String(err?.stack || err);
    });
  </script>
</body>
</html>
